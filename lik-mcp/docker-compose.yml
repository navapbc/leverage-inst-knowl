services:
  db:
    image: postgres:18.4
    environment:
      POSTGRES_DB: likdb
      POSTGRES_USER: lik
      POSTGRES_PASSWORD: lik
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      # Postgres 18+ images store data in a major-version subdirectory; mount the
      # whole dir, not /var/lib/postgresql/data.
      - likdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lik -d likdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  likdata:
