# Deploy skill directories under `.claude/skills/` to Claude Managed Agents as new skill versions.
# Manually dispatched (like deploy-images.yml) — a maintainer chooses which skill to publish after
# the SKILL.md change has been reviewed and merged. Agents pin skills to `latest`, so a new version
# rolls out on the agent's next session with no further step. See
# docs/plans/2026-07-23-001-feat-skill-instruction-deploy-pipeline-plan.md.
#
# Prerequisites (set once in repo Settings, on the `prod` environment):
#   - Secret ANTHROPIC_API_KEY = a standard org API key (sk-ant-api03-...) scoped to the workspace
#     that holds the agents/skills. Not an admin key.

name: Deploy skills to Managed Agents

on:
  workflow_dispatch:
    inputs:
      skill:
        description: Which skill(s) to deploy
        type: choice
        options:
          - all
          - lik-query-project-index
          - lik-sync-catalog-from-project-indexes
        default: all

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # The prod environment scopes ANTHROPIC_API_KEY (and enables optional deployment protection
    # rules). Env-scoped secrets only resolve when the job declares this.
    environment: prod
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Deploy skill(s)
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python deploy_skills.py --skill "${{ inputs.skill }}"
