{% extends "base.html" %}
{% block title %}Chat · lik-ui{% endblock %}
{% block body_class %}chat-page{% endblock %}
{% block content %}
  <p><a href="/connections?agent_id={{ session.agent_id | urlencode }}">Agent connections</a></p>

  <h1>Chat Session</h1>

  <div id="transcript"
       data-session-id="{{ session.session_id }}"
       data-agent-id="{{ session.agent_id }}"></div>

  <form id="composer">
    <input id="message" name="message" autocomplete="off" placeholder="Ask the agent…" style="width:75%">
    <button class="btn" type="submit">Send</button>
  </form>

  <!-- Markdown rendering for agent replies. DOMPurify sanitizes because tool results can
       echo arbitrary content from the connected sources (Confluence/Jira). -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="/static/chat.js"></script>
{% endblock %}
