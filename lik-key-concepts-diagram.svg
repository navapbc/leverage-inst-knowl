<svg width="860" height="730" viewBox="0 0 860 730" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <title>LIK Key Concepts Diagram</title>
  <desc>Key concepts: Data Sources (each authoritative for what it holds) hold both the primary DS records and most of the Discovery Layer as DL records — summaries, indexes, and pointers marked discovery-layer, which the source stores and backs up and which are rebuilt on demand. The Discovery Layer's own store holds the other two kinds of DL output: the Catalog (a directory from topic to where material lives, built only from the DL records, recomputed and not backed up) and Confirmation signals (people vouching a cited source was right or flagging it wrong, recorded by a Query skill from a user's positive or negative feedback, the one part the Layer backs up itself). DL-creation skills read the sources and produce the DL outputs through MCP; Query skills steer an agent to the right material under the asking person's permissions; Users/Agents/Apps ask, get answers, confirm sources, and write new knowledge. Everything reads and writes through MCP under a verified identity.</desc>

  <defs>
    <marker id="arrDark" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#555"/>
    </marker>
    <marker id="arrDarkRev" markerWidth="7" markerHeight="7" refX="0" refY="3.5" orient="auto-start-reverse">
      <path d="M7,0 L0,3.5 L7,7 Z" fill="#555"/>
    </marker>
    <marker id="arrGreen" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#2D8B57"/>
    </marker>
    <marker id="arrPurple" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#7D3C98"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="730" fill="#F5F7FA"/>

  <!-- ===== USERS ===== -->
  <rect x="40" y="28" width="500" height="72" rx="8" fill="#EAECEE" stroke="#A0A8B0" stroke-width="1.5"/>
  <text x="290" y="58" text-anchor="middle" font-size="14" font-weight="700" fill="#2C3E50">Users / Agents / Apps</text>
  <text x="290" y="78" text-anchor="middle" font-size="10" fill="#6B7785">ask questions · get answers · confirm sources · write new knowledge to Data Sources</text>

  <!-- ===== DISCOVERY LAYER's own store ===== -->
  <rect x="40" y="128" width="500" height="216" rx="8" fill="#E8F3FA" stroke="#B0D0E8" stroke-width="1.5"/>
  <text x="290" y="151" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4A6B">Discovery Layer  —  the Layer's own store</text>
  <text x="290" y="167" text-anchor="middle" font-size="9.5" font-style="italic" fill="#5A8BA8">derived from Data Sources · only job: make knowledge easy to find &amp; reuse</text>
  <text x="290" y="181" text-anchor="middle" font-size="8.5" font-weight="700" fill="#5A8BA8">Two kinds kept here; the third — DL records — lives in the Data Sources below</text>

  <!-- Catalog -->
  <rect x="60" y="190" width="460" height="62" rx="6" fill="#FFFFFF" stroke="#2A7EAA" stroke-width="2"/>
  <rect x="60" y="190" width="82" height="62" rx="6" fill="#D6EAF8"/>
  <text x="101" y="215" text-anchor="middle" font-size="9" font-weight="700" fill="#1B4A6B">ENTRY</text>
  <text x="101" y="228" text-anchor="middle" font-size="9" font-weight="700" fill="#1B4A6B">POINT</text>
  <text x="301" y="212" text-anchor="middle" font-size="12" font-weight="700" fill="#1B4A6B">The Catalog</text>
  <text x="301" y="227" text-anchor="middle" font-size="9.5" fill="#2A7EAA">one directory · topic → where its material lives</text>
  <text x="301" y="242" text-anchor="middle" font-size="8.5" font-style="italic" fill="#5A8BA8">built only from the DL records · recomputed, not backed up</text>

  <!-- Confirmation signals -->
  <rect x="60" y="260" width="460" height="76" rx="5" fill="#FFFFFF" stroke="#9B59B6" stroke-width="1.5"/>
  <text x="290" y="279" text-anchor="middle" font-size="12" font-weight="700" fill="#6C2A6A">Confirmation signals</text>
  <text x="290" y="295" text-anchor="middle" font-size="9" fill="#8E44AD">people vouching the cited source was right — or flagging it wrong</text>
  <text x="290" y="311" text-anchor="middle" font-size="9" fill="#8E44AD">recorded by a Query skill when a person gives positive or negative feedback on a cited source</text>
  <text x="290" y="327" text-anchor="middle" font-size="8.5" font-style="italic" fill="#A569BD">can't be re-derived → the one part the Layer backs up itself</text>

  <!-- ===== QUERY SKILLS ===== -->
  <rect x="565" y="128" width="255" height="104" rx="8" fill="#F4ECF7" stroke="#7D3C98" stroke-width="2"/>
  <text x="692" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#5B2282">Query skills</text>
  <text x="692" y="168" text-anchor="middle" font-size="9.5" fill="#7D3C98">the guides — steer an agent to the</text>
  <text x="692" y="180" text-anchor="middle" font-size="9.5" fill="#7D3C98">right material or the right source</text>
  <text x="692" y="196" text-anchor="middle" font-size="9" fill="#A569BD">run under the asking person's own permissions</text>
  <text x="692" y="212" text-anchor="middle" font-size="8.5" font-style="italic" fill="#A569BD">many, not one — each covers a topic;</text>
  <text x="692" y="224" text-anchor="middle" font-size="8.5" font-style="italic" fill="#A569BD">can skip the Catalog when it knows the topic</text>

  <!-- Query skills to Catalog -->
  <line x1="565" y1="196" x2="522" y2="218" stroke="#7D3C98" stroke-width="1.5" marker-end="url(#arrPurple)"/>
  <text x="543" y="202" text-anchor="middle" font-size="8.5" fill="#7D3C98">queries</text>

  <!-- Query skills record Confirmation signals from user feedback -->
  <path d="M575,232 C550,252 545,272 523,286" fill="none" stroke="#7D3C98" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrPurple)"/>
  <text x="547" y="300" text-anchor="middle" font-size="8.5" fill="#7D3C98">records</text>

  <!-- ===== DL-CREATION SKILLS ===== -->
  <rect x="565" y="250" width="255" height="110" rx="8" fill="#E9F7EF" stroke="#2D8B57" stroke-width="2"/>
  <text x="692" y="273" text-anchor="middle" font-size="12" font-weight="700" fill="#1A5E34">DL-creation skills</text>
  <text x="692" y="289" text-anchor="middle" font-size="9.5" fill="#2D8B57">the automated producers</text>
  <text x="692" y="304" text-anchor="middle" font-size="9" fill="#52BE80">reads DSs · writes DL records + Catalog rows</text>
  <text x="692" y="319" text-anchor="middle" font-size="9" fill="#52BE80">own service identity · scheduled or on demand</text>
  <text x="692" y="336" text-anchor="middle" font-size="8.5" font-style="italic" fill="#52BE80">many, not one — each specialized</text>
  <text x="692" y="348" text-anchor="middle" font-size="8.5" font-style="italic" fill="#52BE80">to the source data it handles</text>

  <!-- DL-creation produces the Catalog -->
  <path d="M565,262 C540,262 540,225 523,225" fill="none" stroke="#2D8B57" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="556" y="252" text-anchor="middle" font-size="8.5" fill="#2D8B57">produces</text>

  <!-- DL-creation reads & writes DSs via MCP (dashed) -->
  <line x1="692" y1="360" x2="692" y2="402" stroke="#2D8B57" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>
  <text x="700" y="378" font-size="8.5" fill="#2D8B57">reads &amp; writes</text>
  <text x="700" y="390" font-size="8.5" fill="#2D8B57">DSs via MCP</text>

  <!-- Users to Query skills arcs -->
  <path d="M540,64 C575,64 565,128 565,176" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrDark)"/>
  <path d="M565,150 C565,100 552,76 540,76" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrDark)"/>
  <text x="572" y="112" font-size="8.5" fill="#555">asks /</text>
  <text x="572" y="124" font-size="8.5" fill="#555">answers</text>

  <!-- Users write via agent dashed arrow on left -->
  <line x1="60" y1="100" x2="60" y2="402" stroke="#B0B8C0" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#arrDark)"/>
  <text x="30" y="251" text-anchor="middle" font-size="8.5" fill="#A0A8B0" transform="rotate(-90,30,251)">writes via agent</text>

  <!-- ===== MCP ===== -->
  <rect x="40" y="402" width="780" height="60" rx="6" fill="#2A7EAA"/>
  <text x="430" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">MCP  (Model Context Protocol)</text>
  <text x="430" y="442" text-anchor="middle" font-size="10" fill="#CBE7F7">Reads and writes to Data Sources flow through MCP under a verified identity</text>
  <text x="430" y="455" text-anchor="middle" font-size="9" fill="#97C8E8">Each source enforces its own native permissions on every call</text>

  <!-- MCP double arrow -->
  <line x1="430" y1="462" x2="430" y2="498" stroke="#1B4A6B" stroke-width="2" marker-end="url(#arrDark)" marker-start="url(#arrDarkRev)"/>

  <!-- ===== DATA SOURCES ===== -->
  <rect x="40" y="498" width="780" height="212" rx="7" fill="#1B4A6B"/>
  <text x="430" y="522" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Data Sources  —  each authoritative for what it holds</text>
  <text x="430" y="540" text-anchor="middle" font-size="10" fill="#A8CCED">Drive · Confluence · Jira · GitHub · Slack · Salesforce · Workday</text>
  <text x="430" y="556" text-anchor="middle" font-size="9.5" font-style="italic" fill="#7AABCE">each system controls who may see what · holds two kinds of DS record:</text>

  <!-- DL records sub-box (left): most of the Discovery Layer lives inside the Data Sources -->
  <rect x="58" y="572" width="486" height="122" rx="6" fill="#FFFFFF" stroke="#5BAD6F" stroke-width="1.5"/>
  <rect x="58" y="572" width="110" height="122" rx="6" fill="#E9F7EF"/>
  <text x="113" y="620" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E6B32">A DL record</text>
  <text x="113" y="636" text-anchor="middle" font-size="8" font-style="italic" fill="#4A8A5A">kept safe by</text>
  <text x="113" y="647" text-anchor="middle" font-size="8" font-style="italic" fill="#4A8A5A">the Data Source</text>
  <text x="356" y="596" text-anchor="middle" font-size="11" font-weight="700" fill="#1E6B32">DL records — most of the Discovery Layer</text>
  <text x="356" y="613" text-anchor="middle" font-size="8.5" font-style="italic" fill="#4A8A5A">discovery-layer DS records · derived, not authoritative</text>
  <text x="356" y="630" text-anchor="middle" font-size="9" fill="#4A8A5A">summaries · indexes · pointers · signals</text>
  <text x="356" y="646" text-anchor="middle" font-size="9" fill="#4A8A5A">the source stores &amp; backs them up · rebuilt on demand</text>
  <text x="356" y="664" text-anchor="middle" font-size="8.5" font-style="italic" fill="#78AA82">edited or verified copies are left in place</text>

  <!-- Primary DS records sub-box (right) -->
  <rect x="556" y="572" width="246" height="122" rx="6" fill="#FFFFFF" stroke="#2A7EAA" stroke-width="2"/>
  <text x="679" y="600" text-anchor="middle" font-size="11" font-weight="700" fill="#1B4A6B">Primary DS records</text>
  <text x="679" y="619" text-anchor="middle" font-size="9" fill="#2A7EAA">the authoritative originals</text>
  <text x="679" y="637" text-anchor="middle" font-size="9" fill="#2A7EAA">pages · tickets · threads · PRs · files</text>
  <text x="679" y="657" text-anchor="middle" font-size="8.5" font-style="italic" fill="#5A8BA8">every lasting change is written here</text>

</svg>
